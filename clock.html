<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moon Clock</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f0ed;
      --card: rgba(255,255,255,0.38);
      --card-border: rgba(255,255,255,0.5);
      --text: #645963;
      --muted: #8e818b;
      --pill: rgba(255,255,255,0.44);
      --glow: rgba(255,255,255,0.55);
      --shadow: 0 16px 50px rgba(103, 88, 100, 0.12);
      --accent: #d7cad2;
      --accent-soft: rgba(255,255,255,0.28);
      --orb-main: #f7e0be;
      --orb-glow: rgba(247, 224, 190, 0.35);
      --line: rgba(255,255,255,0.35);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      transition: background 0.9s ease;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      position: relative;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
    }

    .widget {
      width: 100%;
      min-height: 260px;
      border-radius: 34px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      position: relative;
      transition: all 0.9s ease;
    }

    .scene {
      height: 106px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02));
      border-bottom: 1px solid var(--line);
    }

    .scene::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      top: -86px;
      right: 28px;
      background: radial-gradient(circle, var(--orb-glow) 0%, rgba(255,255,255,0) 72%);
      filter: blur(6px);
      transition: all 0.9s ease;
    }

    .orb {
      position: absolute;
      width: 56px;
      height: 56px;
      right: 44px;
      top: 18px;
      border-radius: 50%;
      background: var(--orb-main);
      box-shadow:
        0 0 0 10px rgba(255,255,255,0.08),
        0 0 24px var(--orb-glow);
      transition: all 0.9s ease;
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.32);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 999px;
      transition: all 0.9s ease;
    }

    .cloud.c1 {
      width: 88px;
      height: 26px;
      left: 26px;
      top: 32px;
    }

    .cloud.c2 {
      width: 64px;
      height: 20px;
      left: 88px;
      top: 60px;
      opacity: 0.85;
    }

    .cloud.c3 {
      width: 72px;
      height: 22px;
      right: 118px;
      top: 64px;
      opacity: 0.72;
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 0 10px rgba(255,255,255,0.55);
    }

    .star.s1 { top: 18px; left: 34px; }
    .star.s2 { top: 28px; left: 82px; width: 3px; height: 3px; }
    .star.s3 { top: 48px; left: 142px; width: 3px; height: 3px; }
    .star.s4 { top: 24px; right: 132px; }
    .star.s5 { top: 56px; right: 166px; width: 3px; height: 3px; }
    .star.s6 { top: 36px; right: 82px; width: 3px; height: 3px; }

    .content {
      padding: 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .label {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .time {
      font-size: clamp(58px, 10vw, 80px);
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: -0.06em;
      color: var(--text);
    }

    .date {
      font-size: 17px;
      color: var(--muted);
      font-weight: 500;
    }

    .phase-pill {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 11px 16px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid rgba(255,255,255,0.34);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.9s ease;
    }

    .phase-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.42);
    }

    /* MORNING */
    body.morning {
      --bg: linear-gradient(180deg, #f6ede7 0%, #efe3dc 100%);
      --card: rgba(255, 250, 247, 0.38);
      --card-border: rgba(255,255,255,0.55);
      --text: #675850;
      --muted: #9b897d;
      --pill: rgba(255,255,255,0.46);
      --glow: rgba(255,248,236,0.6);
      --shadow: 0 18px 48px rgba(174, 145, 116, 0.12);
      --accent: #ead3bf;
      --accent-soft: rgba(255,248,243,0.3);
      --orb-main: #f6d8a7;
      --orb-glow: rgba(246,216,167,0.44);
      --line: rgba(255,255,255,0.42);
    }

    /* DAY */
    body.day {
      --bg: linear-gradient(180deg, #f5f1ef 0%, #ece6e4 100%);
      --card: rgba(255,255,255,0.36);
      --card-border: rgba(255,255,255,0.55);
      --text: #5d5653;
      --muted: #88817d;
      --pill: rgba(255,255,255,0.44);
      --glow: rgba(255,255,255,0.58);
      --shadow: 0 18px 48px rgba(115, 106, 100, 0.11);
      --accent: #d9d6d5;
      --accent-soft: rgba(255,255,255,0.28);
      --orb-main: #f2f0ec;
      --orb-glow: rgba(255,255,255,0.45);
      --line: rgba(255,255,255,0.38);
    }

    /* EVENING */
    body.evening {
      --bg: linear-gradient(180deg, #eee5ea 0%, #dfd3dc 100%);
      --card: rgba(255, 248, 252, 0.34);
      --card-border: rgba(255,255,255,0.45);
      --text: #675b66;
      --muted: #8d808a;
      --pill: rgba(255,255,255,0.38);
      --glow: rgba(250,233,242,0.5);
      --shadow: 0 18px 48px rgba(119, 100, 112, 0.14);
      --accent: #dfc9d5;
      --accent-soft: rgba(255,248,251,0.25);
      --orb-main: #efc8b6;
      --orb-glow: rgba(239,200,182,0.36);
      --line: rgba(255,255,255,0.32);
    }

    /* NIGHT */
    body.night {
      --bg: linear-gradient(180deg, #222736 0%, #191d2a 100%);
      --card: rgba(36, 41, 58, 0.42);
      --card-border: rgba(255,255,255,0.08);
      --text: #f2ece5;
      --muted: #bbb3ad;
      --pill: rgba(255,255,255,0.08);
      --glow: rgba(192,205,255,0.18);
      --shadow: 0 18px 48px rgba(8, 10, 20, 0.34);
      --accent: #7080a1;
      --accent-soft: rgba(255,255,255,0.06);
      --orb-main: #f2efe8;
      --orb-glow: rgba(242,239,232,0.15);
      --line: rgba(255,255,255,0.08);
    }

    body.night .cloud {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.04);
    }

    body.night .stars {
      opacity: 1;
    }

    body.night .phase-pill {
      border: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 480px) {
      .widget {
        min-height: 248px;
        border-radius: 30px;
      }

      .scene {
        height: 98px;
      }

      .content {
        padding: 22px 22px 22px;
      }

      .label {
        font-size: 12px;
      }

      .date {
        font-size: 16px;
      }

      .phase-pill {
        font-size: 14px;
        padding: 10px 14px;
      }

      .orb {
        width: 52px;
        height: 52px;
        right: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="widget">
      <div class="scene">
        <div class="orb"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>

        <div class="stars">
          <div class="star s1"></div>
          <div class="star s2"></div>
          <div class="star s3"></div>
          <div class="star s4"></div>
          <div class="star s5"></div>
          <div class="star s6"></div>
        </div>
      </div>

      <div class="content">
        <div class="label">Moon Clock</div>
        <div class="time" id="time">18:50</div>
        <div class="date" id="date">12 July, Sunday</div>

        <div class="phase-pill">
          <span class="phase-icon" id="phaseIcon">🌆</span>
          <span id="phaseText">quiet evening</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const timeEl = document.getElementById("time");
    const dateEl = document.getElementById("date");
    const phaseTextEl = document.getElementById("phaseText");
    const phaseIconEl = document.getElementById("phaseIcon");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function getPhase(hour) {
      if (hour >= 5 && hour < 12) {
        return {
          className: "morning",
          icon: "🌤",
          text: "soft morning"
        };
      } else if (hour >= 12 && hour < 17) {
        return {
          className: "day",
          icon: "☁️",
          text: "gentle day"
        };
      } else if (hour >= 17 && hour < 22) {
        return {
          className: "evening",
          icon: "🌆",
          text: "quiet evening"
        };
      } else {
        return {
          className: "night",
          icon: "🌙",
          text: "moonlit night"
        };
      }
    }

    function updateClock() {
      const now = new Date();

      const hours = pad(now.getHours());
      const minutes = pad(now.getMinutes());
      timeEl.textContent = `${hours}:${minutes}`;

      const day = now.toLocaleDateString("en-GB", { day: "numeric" });
      const month = now.toLocaleDateString("en-GB", { month: "long" });
      const weekday = now.toLocaleDateString("en-GB", { weekday: "long" });
      dateEl.textContent = `${day} ${month}, ${weekday}`;

      const phase = getPhase(now.getHours());
      document.body.className = phase.className;
      phaseTextEl.textContent = phase.text;
      phaseIconEl.textContent = phase.icon;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
